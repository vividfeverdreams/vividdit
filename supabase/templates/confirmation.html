<html>
  <body style="font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; color: #18181b;">
    <h2>Confirm your Vividdit account</h2>
    <p>Click the link below to confirm your email and start creating download gates.</p>
    <p>
      <a
        href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email"
        style="display: inline-block; padding: 10px 18px; background: #18181b; color: #fafafa; border-radius: 8px; text-decoration: none;"
      >
        Confirm email
      </a>
    </p>
    <p style="color: #71717a; font-size: 13px;">
      If you didn't create a Vividdit account, you can ignore this email.
    </p>
  </body>
</html>
